<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra mật khẩu</title>
</head>
<body>
    <h1>Bài tập kiểm tra mật khẩu</h1>
    <script>
        function checkPassword() {
            let password = "";
            let isValid = false;

            while (!isValid) {
                password = prompt("Vui lòng nhập mật khẩu của bạn:");
                if (password === null) return;

                let errors = [];

                if (password.length < 8) {
                    errors.push("Mật khẩu phải có ít nhất 8 ký tự.");
                }

                // 2. Kiểm tra chữ hoa (A-Z)
                if (!/[A-Z]/.test(password)) {
                    errors.push("Phải chứa ít nhất một chữ cái viết hoa (A-Z).");
                }

                // 3. Kiểm tra chữ thường (a-z)
                if (!/[a-z]/.test(password)) {
                    errors.push("Phải chứa ít nhất một chữ cái viết thường (a-z).");
                }

                // 4. Kiểm tra chữ số (0-9)
                if (!/[0-9]/.test(password)) {
                    errors.push("Phải chứa ít nhất một chữ số (0-9).");
                }

                // 5. Kiểm tra ký tự đặc biệt (@, #, $, %...)
                if (!/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                    errors.push("Phải chứa ít nhất một ký tự đặc biệt.");
                }

                if (errors.length > 0) {
                    alert("Mật khẩu không hợp lệ:\n- " + errors.join("\n- ") + "\nVui lòng nhập lại.");
                } else {
                    isValid = true;
                    let strength = "";

                    // Đánh giá độ mạnh
                    if (password.length >= 12) {
                        strength = "Mạnh";
                    } else if (password.length >= 8) {
                        // Vì đã vượt qua vòng check errors nên chắc chắn đủ điều kiện
                        // Nếu dưới 12 ký tự thì là Trung bình
                        strength = "Trung bình";
                        
                        // Nếu đề bài yêu cầu "Chỉ vừa đủ 8 ký tự" mới là Yếu:
                        if (password.length === 8) {
                            strength = "Yếu";
                        }
                    }

                    alert("Mật khẩu hợp lệ!\nĐộ mạnh: " + strength);
                }
            }
        }

        // Gọi hàm thực hiện ngay khi load trang
        checkPassword();
    </script>
</body>
</html>
